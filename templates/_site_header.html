<header class="site-banner" role="banner">
  <div class="site-banner__inner">
    <a href="/?lang={{ lang }}" class="site-logo" aria-label="{{ company_name }} — Start">
      <span class="site-logo__mark" aria-hidden="true">
        <svg class="site-logo__svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M23 4h4v22h-4V4z" fill="currentColor"/>
          <path d="M15 26h18l-3.5 12H18.5L15 26z" fill="currentColor" opacity="0.88"/>
          <path d="M4 38h8l2.5-6H7l1.8 4.2H4V38z" fill="currentColor" opacity="0.75"/>
          <path d="M26 16h14v2H26v-2zm0 5h11v2H26v-2zm0 5h8v2h-8v-2z" fill="currentColor" opacity="0.45"/>
          <path
            d="M22 32h15a3 3 0 1 1 0 6H22v-2h15a1 1 0 1 0 0-2H22v-2z"
            fill="url(#logo-fiber)"
          />
          <defs>
            <linearGradient id="logo-fiber" x1="22" y1="35" x2="42" y2="35" gradientUnits="userSpaceOnUse">
              <stop stop-color="#2ee6a8"/>
              <stop offset="1" stop-color="#0f6e56"/>
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="site-logo__wordmark">{{ company_name }}</span>
    </a>
    <div class="site-banner__meta">
      <p class="site-banner__kicker">GLASFASER HAUSANSCHLUSS · DEUTSCHLAND</p>
      <div class="header-contact-row" aria-label="Kontakt Schnellwahl">
        <a class="header-contact" href="tel:{{ contact_phone | replace(' ', '') | replace('-', '') }}" aria-label="Anrufen: {{ contact_phone }}">
          <span class="header-contact__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </span>
          <span class="header-contact__text">{{ contact_phone }}</span>
        </a>
        <a class="header-contact" href="mailto:{{ contact_email }}" aria-label="E-Mail an {{ contact_email }}">
          <span class="header-contact__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <span class="header-contact__text header-contact__text--mail">{{ contact_email }}</span>
        </a>
        <span class="header-contact header-contact--static" title="Deutschland" aria-label="Deutschland">
          <span class="header-contact__icon header-contact__icon--flag" aria-hidden="true">
            <svg width="22" height="15" viewBox="0 0 22 15" class="flag-de">
              <rect width="22" height="5" y="0" fill="#000"/>
              <rect width="22" height="5" y="5" fill="#DD0000"/>
              <rect width="22" height="5" y="10" fill="#FFCE00"/>
            </svg>
          </span>
        </span>
      </div>
    </div>
  </div>
  <p class="site-slogan">Ihr Glasfaser-Partner vor Ort</p>
</header>
